services:
  backend:
    image: todo-backend:${BUILD_NUMBER:-latest}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
    networks:
      - staging

  frontend:
    image: todo-frontend:${BUILD_NUMBER:-latest}
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - staging

networks:
  staging:
    driver: bridge
